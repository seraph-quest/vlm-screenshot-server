services:
  screenshot-vlm:
    build: .
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8088}
      VLM_BASE_URL: ${VLM_BASE_URL:-http://gpu-host.local:8000/v1}
      VLM_API_KEY: ${VLM_API_KEY:-}
      VLM_MODEL: ${VLM_MODEL:-google/gemma-4-12b-it}
      VLM_TIMEOUT_SECONDS: ${VLM_TIMEOUT_SECONDS:-120}
      VLM_MAX_TOKENS: ${VLM_MAX_TOKENS:-700}
      VLM_TEMPERATURE: ${VLM_TEMPERATURE:-0}
      REDACT_VISIBLE_TEXT: ${REDACT_VISIBLE_TEXT:-true}
    ports:
      - "8088:8088"
    restart: unless-stopped
