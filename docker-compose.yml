services:
  screenshot-vlm:
    build: .
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-8001}
      VLM_BASE_URL: ${VLM_BASE_URL:-http://127.0.0.1:8000/v1}
      VLM_API_KEY: ${VLM_API_KEY:-}
      VLM_MODEL: ${VLM_MODEL:-unsloth/gemma-4-26B-A4B-it-qat-GGUF}
      VLM_TIMEOUT_SECONDS: ${VLM_TIMEOUT_SECONDS:-180}
      VLM_MAX_TOKENS: ${VLM_MAX_TOKENS:-700}
      VLM_TEMPERATURE: ${VLM_TEMPERATURE:-0}
      VLM_TRUST_ENV: ${VLM_TRUST_ENV:-false}
      REDACT_VISIBLE_TEXT: ${REDACT_VISIBLE_TEXT:-true}
      CHAT_PROXY_ENABLED: ${CHAT_PROXY_ENABLED:-false}
      CHAT_PROXY_API_KEY: ${CHAT_PROXY_API_KEY:-}
      QUEUE_MAX_SIZE: ${QUEUE_MAX_SIZE:-8}
      QUEUE_WORKERS: ${QUEUE_WORKERS:-1}
      QUEUE_BACKGROUND_WORKERS: ${QUEUE_BACKGROUND_WORKERS:-1}
      QUEUE_ADMIT_TIMEOUT_SECONDS: ${QUEUE_ADMIT_TIMEOUT_SECONDS:-1}
      QUEUE_RESULT_TIMEOUT_SECONDS: ${QUEUE_RESULT_TIMEOUT_SECONDS:-600}
    ports:
      - "${HOST_BIND:-0.0.0.0}:${HOST_PORT:-8001}:${PORT:-8001}"
    restart: unless-stopped
